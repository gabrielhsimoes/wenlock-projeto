<div class="p-6 bg-white h-full flex flex-col">
  <!-- Header -->
  <div class="flex items-start justify-between">
    <div>
      <h2 class="text-lg font-semibold text-gray-900">Visualizar Usuário</h2>
    </div>

    <button
      type="button"
      (click)="close()"
      class="text-gray-500 hover:text-gray-800 transition-colors"
    >
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <div class="flex items-center gap-3 py-4">
    <span class="text-xs">Dados do Usuário</span>
    <div class="h-px flex-1 bg-gray-800"></div>
  </div>

  <!-- Dados do usuário -->
  <div class="space-y-5 text-sm">
    <div class="flex gap-10">
      <div>
        <div class="text-gray-500">Nome</div>
        <div class="font-semibold text-gray-900">{{ data.fullName }}</div>
      </div>

      <div>
        <div class="text-gray-500">Matrícula</div>
        <div class="font-semibold text-gray-900">
          {{ data.registration || "-" }}
        </div>
      </div>
    </div>

    <div>
      <div class="text-gray-500">E-mail</div>
      <div class="font-semibold text-gray-900">{{ data.email }}</div>
    </div>

    <div class="flex items-center gap-3 py-4 pb-0">
      <span class="text-xs">Detalhes</span>
      <div class="h-px flex-1 bg-gray-800"></div>
    </div>

    <div class="flex gap-10">
      <div>
        <div class="text-gray-500">Data de criação</div>
        <div class="font-semibold text-gray-900">
          {{ data.createdAt | date: "dd/MM/yyyy" }}
        </div>
      </div>

      <div>
        <div class="text-gray-500">Última edição</div>
        <div class="font-semibold text-gray-900">
          {{
            data.updatedAt ? (data.updatedAt | date: "dd/MM/yyyy") : "Nenhuma"
          }}
        </div>
      </div>
    </div>
  </div>

  <!-- empurra o conteúdo pra cima -->
  <div class="flex-1"></div>

  <div class="flex justify-center">
    <button
          type="button"
          (click)="close()"
          class="p-3 px-8 bg-white border border-[#555] rounded-lg font-semibold hover:bg-[#00606D40] transition-colors duration-300 ease-in-out"
        >
          Fechar
        </button>

  </div>
</div>
