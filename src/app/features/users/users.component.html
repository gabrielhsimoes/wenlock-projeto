<div class="p-4">
  <p class="font-bold text-3xl">Usuários</p>
</div>

<div class="lg:flex grid gap-2 grid-cols-1 justify-between items-center p-2 px-0">
  <!-- Pesquisar -->
  <div
    class="flex items-center bg-white rounded-md p-3 px-5 border border-[#cacaca] shadow-md"
  >
    <mat-icon class="text-gray-600 mr-2">search</mat-icon>
    <input
      matInput
      type="text"
      placeholder="Pesquisa"
      [formControl]="searchFilter"
      class="bg-transparent outline-none border-none w-full text-sm placeholder:text-gray-600"
    />

    <button
      *ngIf="searchFilter.value"
      (click)="clearSearch()"
      type="button"
      class="flex items-center text-gray-500 hover:text-gray-800 transition-colors"
    >
      <mat-icon class="text-base">close</mat-icon>
    </button>
  </div>

  <!-- Cadastrar novo usuário -->
  <button
    routerLink="/controle-acesso/usuarios/novo"
    class="flex items-center p-3 px-5 bg-[#0290a4] text-white rounded-md font-medium text-md hover:bg-[#075e6b] transition-colors duration-300 ease-in-out"
  >
    <mat-icon>add</mat-icon>
    Cadastrar Usuário
  </button>
</div>

<!-- Tabela de usuários -->
<table mat-table [dataSource]="dataSource" class="users-table">
  <!-- Nome -->
  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef>Nome</th>
    <td mat-cell *matCellDef="let u">{{ u.fullName }}</td>
  </ng-container>

  <!-- Ações -->
  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef class="actions-header">Ações</th>

    <td mat-cell *matCellDef="let u" class="actions-cell">
      <div class="actions-group">
        <button (click)="openView(u)" class="p-1 hover:bg-[#00606D40] rounded">
          <img src="visibility.svg" width="20" />
        </button>

        <button (click)="onEditUser(u)" class="p-1 hover:bg-[#00606D40] rounded">
          <img src="edit.svg" width="20" />
        </button>

        <button (click)="onDeleteUser(u)" class="p-1 hover:bg-[#00606D40] rounded">
          <img src="delete.svg" width="20" />
        </button>
      </div>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

  <!-- Nenhum resultado encontrado -->
  <tr class="mat-row" *matNoDataRow>
    <td class="mat-cell" [attr.colspan]="displayedColumns.length">
      <div
        class="flex flex-col items-center justify-center py-20 text-center bg-white"
      >
        <ng-container *ngIf="hasFilter; else emptyTable">
          <img src="search-not-found.svg" alt="" />
          <br />
          <p class="mt-6 text-xl font-medium">Nenhum Resultado Encontrado</p>
          <p class="w-96">
            Não foi possível achar nenhum resultado para sua busca. Tente
            refazer a pesquisa para encontrar o que busca.
          </p>
        </ng-container>

        <!-- Nenhum usuário registrado -->
        <ng-template #emptyTable>
          <p class="text-lg font-medium text-gray-700">
            Nenhum Usuário Registrado
          </p>
          <p class="text-sm text-gray-500">
            Clique em "Cadastrar Usuário" para começar a cadastrar.
          </p>
        </ng-template>
      </div>
    </td>
  </tr>
</table>

<mat-paginator
  [pageSize]="5"
  [pageSizeOptions]="[5]"
  [hidePageSize]="true"
  showFirstLastButtons
>
</mat-paginator>
